name : secrate-scan
on :
    workflow_call:

jobs:
    secrate-scan:
        runs-on: ubuntu-latest
        steps:
          - name : clone git code
            uses: actions/checkout@v7
            with :
                fetch-depth : 0 

          - name: Run Gitleaks
            uses: gitleaks/gitleaks-action@v3
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 