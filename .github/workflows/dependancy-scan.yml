# dependency of packages and programming language used in the project
name : dependency-scan

on :
    workflow_call:

jobs:
    code-scan:
        runs-on: ubuntu-latest
        steps:
           - name : clone git code 
             uses: actions/checkout@v7
            
           - name : setup nodeJs
             uses: actions/setup-node@v6
             with:
                node-version: '20'
                cache : 'npm'
                cache-dependency-path: frontend/package-lock.json
        
           - name : Run npm audit 
             run: npm audit          # run: npm audit --audit-level=high # Fails the build only for 'high' or 'critical' flaws
             working-directory: frontend

           - name : setup go
             uses: actions/setup-go@v5
             with:
                 go-version: "1.22"     # check this version when you get error 
                 go-version-file: 'go.mod'
                 cache: true
                 cache-dependency-path: backend/go.sum

           - name: Install govulncheck
             run: go install golang.org/x/vuln/cmd/govulncheck@latest

           - name: Scan Dependencies
             run: govulncheck ./...
             working-directory: backend