name: ci-pipeline

on :
  push:
    branches:
      - feat/matrix-docker-build
jobs:
    lint_frontend:
        runs-on: ubuntu-latest
        steps:
        - name: clone git code 
          uses: actions/checkout@v2

        - name : setup nodeJs
          uses: actions/setup-node@v6
          with:
            node-version: '20'
            cache : 'npm'
            cache-dependency-path: frontend/package-lock.json
        
        - name : install dependencies
          run : npm install
          working-directory: frontend

        - name: Execute ESLint Verification
          run: npm run lint:fix
          working-directory: frontend

        - name: Run Tests
          run: npm run test 
          working-directory: frontend 

      

#        - name : setup docker buildx
#           uses: docker/setup-buildx-action@v4
      
               
    lint_backend:
        runs-on: ubuntu-latest
        steps:
          - name:  git code clone 
            uses: actions/checkout@v2

          - name : setup go
            uses: actions/setup-go@v5
            with:
              go-version: "1.22"     # check this version when you get error 
              go-version-file: 'go.mod'
              cache: true
              cache-dependency-path: backend/go.sum 

          - name: Run golangci-lint
            uses: golangci/golangci-lint-action@v6 
            with :
              version : latest
              working-directory: backend
           
          - name: run tests
            run : go test
            working-directory: backend

         

    build-and-push:
      needs: [lint_frontend, lint_backend]
      runs-on: ubuntu-latest
      strategy:
        matrix:
          docker-folder: ['frontend', 'backend']
      steps:
        - name : clone git code 
          uses: actions/checkout@v2
   
        - name : docker setup [login] 
          uses : docker/login-action@v4
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
          
        - name : build and push docker images
          uses: docker/build-push-action@v7
          with:
            context: ./${{matrix.docker-folder}}
            push: true
            tags: devopsengineerpranav/${{matrix.docker-folder}}:latest



    deploy :
      needs: [lint_frontend, lint_backend, build-and-push]
      uses: ./.github/workflows/cd.yml
      secrets: inherit 
      