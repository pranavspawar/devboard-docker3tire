name: ci-pipeline

on :
  push:
    branches:
      - advanced
jobs:
    frontend:
        runs-on: ubuntu-latest
        steps:
        - name: clone git code 
          uses: actions/checkout@v2

        - name : setup nodeJs
          uses: actions/setup-node@v6
          with:
            node-version: '20'
            cashe : 'npm'
            cashe-dependency-path: frontend/package-lock.json
        
        - name : install dependencies
          run : npm install
          working-directory: frontend

        - name: Execute ESLint Verification
          run: npm run lint:fix
          working-directory: frontend

        - name: Run Tests
          run: npm run test 
          working-directory: frontend 

        - name : docker setup [login] 
          uses : docker/login-action@v4
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Check Docker username
          run: echo "Username=${{ vars.DOCKERHUB_USERNAME }}"
        

#        - name : setup docker buildx
#          uses: docker/setup-buildx-action@v4
        
        - name : build and push docker images
          uses: docker/build-push-action@v7
          with:
            context: ./frontend
            push: true
            tags: devopsengineerpranav/devboard-fe:latest
               
    backend:
        runs-on: ubuntu-latest
        steps:
          - name:  git code clone 
            uses: actions/checkout@v2

          - name : setup go
            uses: actions/setup-go@v5
            with:
              go-version: "1.22"     # check this version when you get error 
              go-version-file: 'go.mod'
              cache: true
              cache-dependency-path: backend/go.sum 

          - name: Run golangci-lint
            uses: golangci/golangci-lint-action@v6 
            with :
              version : latest
              working-directory: backend
           
          - name: run tests
            run : go test
            working-directory: backend

          - name : docker setup [login]
            uses : docker/login-action@v4
            with:
              username: ${{ vars.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}


          - name : build and push docker images
            uses: docker/build-push-action@v7
            with :
              context: ./backend
              push: true
              tags: devopsengineerpranav/devboard-be:latest
